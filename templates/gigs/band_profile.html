{% extends 'gigs/base.html' %}

{% load static %}

{% block title_block %}
Bands
{% endblock %}

{% block header_block %}
{% endblock %}

{% block body_block %}
<div class="text-center m-4">
  <h2>Bands</h2>
</div>

<hr class="mx-5" />


<div class="row justify-content-center">
  <div class="col-5 mx-5">
    <div class="row justify-content-end">
        <div class="col-auto my-3">
            <select class="form-select" id="filter" name="filter">
            <option value="">Filter by</option>
            <option value="date">Date</option>
            <option value="location">Location</option>
            <option value="instrument">Instrument</option>
            </select>
        </div>
    </div>
    <div class="listings-container">
      <!-- add for loop here for band in bands-->
      <div class="listing-card m-2">
        <div class="row">
            <div class="col-auto">
                <img src="{% static 'find_my_gig/images/pfp-placeholder.png' %}" class="profile-pic"/>
            </div>

          <div class="col">
            <a href="" class="subtle-link">
              <h4>Name {{ musician.name }}</h4>
            </a>
          </div>

          <div
            class="col-3 d-flex flex-column align-items-center text-center justify-content-center"
          >

            <button type="button" 
                    data-url="{% url 'gigs:band_profile' band.id %}"
                    onclick="window.location.href=this.dataset.url"
                    class="btn btn-primary nice-button background-color w-100 h-30vh my-2 d-flex align-items-center justify-content-center py-3">
                Review
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
