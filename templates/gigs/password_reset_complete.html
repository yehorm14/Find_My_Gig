{% extends 'gigs/base.html' %}
{% load static %}

{% block title_block %}Reset Complete | Find My Gig{% endblock %}

{% block body_block %}
<div class="container mt-5 pt-4 mb-5">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-5">
      
      <div class="text-center mb-4">
        <h1 class="display-5" style="font-weight: 800; color: #fff;">Password <span class="gig-accent-text">Updated</span></h1>
      </div>

      <div class="listing-card p-5 text-center">
        <h1 class="display-1 mb-4">✅</h1>
        <p class="text-muted-custom mb-4">Your password has been changed successfully. You can now log in with your new credentials.</p>

        <a href="{% url 'gigs:login' %}" class="btn apply-btn rounded-pill px-5 py-2">
          Log In
        </a>
      </div>

    </div>
  </div>
</div>
{% endblock %}
