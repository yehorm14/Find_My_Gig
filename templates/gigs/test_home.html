<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Gig Finder - Home</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../static/find_my_gig/css/style.css">
  </head>
  <body>
    <div class="container-fluid text-center">
      <div class="row min-vh-100 align-items-center justify-content-center">

        <div class="col align-self-stretch">

          <h1 class="home-title text-color">Find My Gig</h1>

          <div class="home-discover">
            <h2 class="m-5 text-color">Discover</h2>

            <div class="row justify-content-center">
              <div class="col">
                <button class="btn btn-primary btn-lg w-100 home-button primary-color">
                  <p class="text-color">Gigs</p>
                </button>
              </div>
              <div class="col">
                <button class="btn btn-primary btn-lg w-100 home-button primary-color">
                  <p class="text-color">Musicians</p>
                </button>
              </div>
            </div>

          </div>

        </div>

        <div class="col-3 align-self-stretch primary-color">
          <div class="row mt-5">
            <p class="text-color">Currently not logged in</p>
          </div>
          <div class="row justify-content-center m-4">
            <button class="btn btn-primary btn-lg home-button background-color">
              <p class="text-color">Log in</p>
            </button>
          </div>
          <div class="row justify-content-center m-4">
            <button class="btn btn-primary btn-lg home-button background-color">
              <p class="text-color">Sign up</p>
            </button>
          </div>
        </div>

      </div>
    </div>
  </body>
</html>
