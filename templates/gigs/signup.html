{% extends 'gigs/base.html' %}

{% load static %}

{% block title_block %}
Sign Up
{% endblock %}

{% block header_detailed %}
{% endblock %}

{% block body_block %}
<div class="row justify-content-center">
  <div class="col-4 my-4">
    <form method="POST" action="">
      {% csrf_token %}

      {% if error_message %}
        <p>{{ error_message }}</p>
      {% endif %}

      <div class="mb-3">
        <div class="form-check form-check-inline">
          <input
            class="form-check-input"
            type="radio"
            name="user_type"
            id="band"
            value="band"
          />
          <label class="form-check-label" for="band">Band</label>
        </div>

        <div class="form-check form-check-inline">
          <input
            class="form-check-input"
            type="radio"
            name="user_type"
            id="musician"
            value="musician"
            checked
          />
          <label class="form-check-label" for="musician">Musician</label>
        </div>
      </div>

      <button type="submit" class="btn btn-primary nice-button primary-color mb-5">
        Continue
      </button>
    </form>
  </div>
</div>
{% endblock %}
