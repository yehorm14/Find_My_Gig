{% extends 'gigs/base.html' %}
{% load static %}

{% block title_block %}
Password Reset
{% endblock %}

{% block header_detailed %}
{% endblock %}

{% block body_block %}
<div class="row justify-content-center">
  <div class="col-4 my-4">
    <h2>Reset your password</h2>
    <p>Enter the email address linked to your account.</p>

    <form method="post" action="">
      {% csrf_token %}
      {{ form.as_p }}

      <button
        type="submit"
        class="btn btn-primary nice-button primary-color"
      >
        Send reset link
      </button>
    </form>
  </div>
</div>
{% endblock %}
